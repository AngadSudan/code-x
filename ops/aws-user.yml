apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-user
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-user-binding
subjects:
- kind: ServiceAccount
  name: api-user
  namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---


