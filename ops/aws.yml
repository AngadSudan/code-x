apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-room
spec:
  replicas: 3
  selector:
    matchLabels:
      app: interview-room
  template:
    metadata:
      labels:
        app: interview-room
    spec:
      containers:
        - name: interview-room
          image: bitwiselearn/codex:js-container
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443

--- 

apiVersion: v1
kind: Service
metadata:
  name: interview-room-service
spec:
  type: ClusterIP
  selector:
    app: interview-room
  ports:
    - name: code-server
      port: 8443
      targetPort: 8443
      protocol: TCP

--- 

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interview-wildcard-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: "*.interview.adheeshverma.me"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-room-service
                port:
                  number: 8443
